<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập Tin Học - Thầy Chuyền</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out;
        }
        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-notification {
            animation: slide-in 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Dữ liệu câu hỏi
        const QUESTIONS = [
            { id: 1, text: "Câu 1: Một trang web đầy đủ thông thường bao gồm những phần chính nào?", keywords: ['đầu', 'thân', 'chân', 'header', 'body', 'footer'], suggestion: "Một trang web đầy đủ thông thường bao gồm 3 phần chính: Phần đầu trang (Header), Phần thân trang (Body) và Phần chân trang (Footer)." },
            { id: 2, text: "Câu 2: Vai trò của phần đầu trang (header) là gì và nó thường chứa những thông tin nào?", keywords: ['điều hướng', 'logo', 'menu', 'tiêu đề', 'giới thiệu'], suggestion: "Header đóng vai trò điều hướng và nhận diện thương hiệu. Thường chứa: Logo, tên trang web, thanh menu (navigation), và có thể có thanh tìm kiếm hoặc thông tin liên hệ ngắn gọn." },
            { id: 3, text: "Câu 3: Favicon là gì và nó được hiển thị ở đâu khi người dùng truy cập trang web?", keywords: ['biểu tượng', 'icon', 'nhỏ', 'tab', 'trình duyệt'], suggestion: "Favicon là một biểu tượng (icon) nhỏ đại diện cho trang web. Nó được hiển thị ở góc trái của tab trình duyệt (thẻ trình duyệt) và trong danh sách dấu trang (bookmark)." },
            { id: 4, text: "Câu 4: Nội dung trong phần thân trang (body) thường được tổ chức và trình bày như thế nào?", keywords: ['bố cục', 'cột', 'hàng', 'khối', 'nội dung chính'], suggestion: "Phần Body thường chứa nội dung chính của trang. Nó được tổ chức theo bố cục dạng lưới (các hàng và cột), chia thành các khối (section/div) rõ ràng, sử dụng tiêu đề, hình ảnh và khoảng trắng để người dùng dễ đọc." },
            { id: 5, text: "Câu 5: Phần chân trang (footer) thường được sử dụng để cung cấp những loại thông tin nào?", keywords: ['bản quyền', 'copyright', 'liên hệ', 'liên kết', 'sitemap', 'mạng xã hội'], suggestion: "Footer thường cung cấp: Thông tin bản quyền (Copyright), thông tin liên hệ chi tiết, các liên kết phụ (chính sách bảo mật, điều khoản), và các biểu tượng mạng xã hội." },
            { id: 6, text: "Câu 6: Bước đầu tiên trong quy trình chuẩn bị xây dựng trang web là gì và tại sao nó lại quan trọng?", keywords: ['mục tiêu', 'chủ đề', 'định hướng', 'mục đích'], suggestion: "Bước đầu tiên là: Xác định mục tiêu và chủ đề của trang web. Nó quan trọng vì đây là kim chỉ nam định hướng cho toàn bộ quá trình thiết kế, chọn nội dung, và lựa chọn đối tượng người dùng sau này." },
            { id: 7, text: "Câu 7: Việc xác định đối tượng người dùng ảnh hưởng như thế nào đến quá trình xây dựng trang web?", keywords: ['nội dung', 'giao diện', 'màu sắc', 'phong cách', 'trải nghiệm'], suggestion: "Đối tượng người dùng quyết định phong cách thiết kế, cách lựa chọn màu sắc, phông chữ, và cách truyền đạt nội dung (ví dụ: web cho trẻ em cần màu sắc sặc sỡ, chữ lớn; web doanh nghiệp cần sự tối giản, chuyên nghiệp)." },
            { id: 8, text: "Câu 8: Trong thiết kế mỹ thuật cho trang web, việc lựa chọn phông chữ cần lưu ý những nguyên tắc gì?", keywords: ['dễ đọc', 'thống nhất', 'nhất quán', 'ít', 'hạn chế', 'tương phản'], suggestion: "Nguyên tắc: Phải dễ đọc, giới hạn số lượng phông chữ (tối đa 2-3 phông), có sự nhất quán giữa các trang, và độ tương phản giữa màu chữ với màu nền phải đủ lớn." },
            { id: 9, text: "Câu 9: Tại sao các phông chữ không chân (Sans Serif) thường được ưu tiên sử dụng cho nội dung bài viết trên màn hình?", keywords: ['dễ nhìn', 'rõ nét', 'màn hình', 'độ phân giải', 'mỏi mắt'], suggestion: "Phông chữ Sans Serif (như Arial, Roboto, Open Sans) có cấu trúc đơn giản, không có các nét gạch nhỏ ở đuôi chữ. Trên màn hình điện tử với các điểm ảnh (pixel), cấu trúc này giúp chữ hiển thị sắc nét, rõ ràng hơn và giảm mỏi mắt khi đọc lâu." },
            { id: 10, text: "Câu 10: Tài liệu đề xuất công cụ cụ thể nào để hỗ trợ xây dựng trang web một cách trực quan và dễ dàng?", keywords: ['google sites', 'wordpress', 'wix', 'mobirise', 'công cụ trực quan'], suggestion: "Tùy thuộc vào chương trình học, nhưng các công cụ phổ biến thường được đề xuất là: Google Sites (rất dễ dùng cho học sinh), WordPress, Wix hoặc các phần mềm như Mobirise để kéo thả trực quan." }
        ];

        function App() {
            const [studentInfo, setStudentInfo] = useState({ name: '', class: '' });
            const [answers, setAnswers] = useState(Array(10).fill(''));
            const [isGraded, setIsGraded] = useState(false);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState([]);
            const [toast, setToast] = useState(null);

            // Hiển thị thông báo
            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            // Lưu dữ liệu vào Local Storage
            const saveToLocalStorage = () => {
                const dataToSave = {
                    studentInfo,
                    answers,
                    isGraded,
                    score,
                    feedback,
                    lastSaved: new Date().toISOString()
                };
                localStorage.setItem('baiTapThayChuyen', JSON.stringify(dataToSave));
                showToast('Đã tự động lưu bài làm!', 'success');
            };

            // Khôi phục dữ liệu từ Local Storage
            const loadFromLocalStorage = () => {
                const savedData = localStorage.getItem('baiTapThayChuyen');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        setStudentInfo(data.studentInfo);
                        setAnswers(data.answers);
                        setIsGraded(data.isGraded);
                        setScore(data.score);
                        setFeedback(data.feedback);
                        showToast('Đã khôi phục bài làm từ bộ nhớ!', 'info');
                        return true;
                    } catch (e) {
                        console.error('Không thể khôi phục dữ liệu');
                        return false;
                    }
                }
                return false;
            };

            // Xóa dữ liệu đã lưu
            const clearLocalStorage = () => {
                if (confirm('Bạn có chắc muốn xóa tất cả dữ liệu đã lưu trong trình duyệt?')) {
                    localStorage.removeItem('baiTapThayChuyen');
                    showToast('Đã xóa dữ liệu đã lưu!', 'warning');
                }
            };

            // Tự động lưu khi có thay đổi
            useEffect(() => {
                if (studentInfo.name || studentInfo.class || answers.some(a => a)) {
                    const timer = setTimeout(() => {
                        saveToLocalStorage();
                    }, 1000);
                    return () => clearTimeout(timer);
                }
            }, [studentInfo, answers, isGraded, score, feedback]);

            // Khôi phục dữ liệu khi tải trang
            useEffect(() => {
                loadFromLocalStorage();
            }, []);

            const handleAnswerChange = (index, value) => {
                const newAnswers = [...answers];
                newAnswers[index] = value;
                setAnswers(newAnswers);
                if (isGraded) {
                    setIsGraded(false);
                    setScore(0);
                    setFeedback([]);
                }
            };

            const handleGrade = () => {
                if (!studentInfo.name.trim() || !studentInfo.class.trim()) {
                    alert("Các em vui lòng nhập đầy đủ Họ tên và Lớp trước khi nộp bài nhé!");
                    return;
                }

                let currentScore = 0;
                const newFeedback = [];

                answers.forEach((ans, index) => {
                    const text = ans.toLowerCase();
                    let point = 0;
                    let note = "";

                    if (text.trim().length < 10) {
                        note = "Câu trả lời quá ngắn, em cần triển khai thêm ý.";
                    } else {
                        const matchedKeywords = QUESTIONS[index].keywords.filter(kw => text.includes(kw));
                        
                        if (matchedKeywords.length >= 2) {
                            point = 1;
                            note = "Rất tốt! Em đã nắm bắt được các ý chính.";
                        } else if (matchedKeywords.length === 1) {
                            point = 0.5;
                            note = "Khá tốt, nhưng em có thể xem thêm phần gợi ý để câu trả lời hoàn thiện hơn.";
                        } else {
                            point = 0.5;
                            note = "Em có ý thức làm bài, hãy đối chiếu với đáp án của thầy để hiểu sâu hơn nhé!";
                        }
                    }

                    currentScore += point;
                    newFeedback.push({ point, note });
                });

                setScore(currentScore);
                setFeedback(newFeedback);
                setIsGraded(true);
                showToast(`Đã chấm điểm! Kết quả: ${currentScore}/10`, 'success');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleReset = () => {
                if(confirm("Em có chắc chắn muốn làm lại từ đầu không? Toàn bộ câu trả lời sẽ bị xóa.")) {
                    setAnswers(Array(10).fill(''));
                    setIsGraded(false);
                    setScore(0);
                    setFeedback([]);
                    setStudentInfo({ name: '', class: '' });
                    showToast('Đã xóa toàn bộ bài làm!', 'info');
                }
            };

            // Xuất file TXT
            const saveAsTXT = () => {
                if (!isGraded) {
                    alert("Vui lòng nộp bài trước khi lưu kết quả!");
                    return;
                }

                let content = `===== KẾT QUẢ BÀI TẬP TIN HỌC =====\n`;
                content += `Ngày làm bài: ${new Date().toLocaleString('vi-VN')}\n`;
                content += `Học sinh: ${studentInfo.name}\n`;
                content += `Lớp: ${studentInfo.class}\n`;
                content += `Điểm: ${score}/10\n`;
                content += `=====================================\n\n`;
                content += `CHI TIẾT CÂU TRẢ LỜI:\n\n`;

                QUESTIONS.forEach((q, index) => {
                    content += `${q.text}\n`;
                    content += `Câu trả lời: ${answers[index] || 'Chưa có câu trả lời'}\n`;
                    content += `Điểm: ${feedback[index]?.point || 0}/1\n`;
                    content += `Nhận xét: ${feedback[index]?.note || 'Chưa có nhận xét'}\n`;
                    content += `Đáp án gợi ý: ${q.suggestion}\n`;
                    content += `-------------------------------------\n\n`;
                });

                content += `===== LỜI NHẮN TỪ THẦY CHUYỀN =====\n`;
                content += score === 10 ? "Tuyệt vời! Em nắm bài rất vững, đúng tinh thần học trò Thầy Chuyền." : 
                         score >= 8 ? "Rất tốt! Tư duy phản biện và ghi nhớ của em rất đáng khen." : 
                         score >= 5 ? "Khá lắm! Em hãy xem lại các phần gợi ý bên dưới để hoàn thiện kiến thức nhé." : 
                         "Không sao, mục đích là để học hỏi! Hãy đọc kỹ gợi ý của thầy và thử lại lần nữa nhé.";

                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = `KetQua_${studentInfo.name}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('Đã xuất file TXT!', 'success');
            };

            // Xuất file CSV (Excel)
            const saveAsCSV = () => {
                if (!isGraded) {
                    alert("Vui lòng nộp bài trước khi xuất kết quả!");
                    return;
                }

                let csvContent = "STT,Câu hỏi,Câu trả lời,Điểm,Nhận xét,Đáp án gợi ý\n";
                
                QUESTIONS.forEach((q, index) => {
                    const row = [
                        index + 1,
                        `"${q.text.replace(/"/g, '""')}"`,
                        `"${(answers[index] || '').replace(/"/g, '""')}"`,
                        feedback[index]?.point || 0,
                        `"${(feedback[index]?.note || '').replace(/"/g, '""')}"`,
                        `"${q.suggestion.replace(/"/g, '""')}"`
                    ].join(',');
                    csvContent += row + "\n";
                });

                // Thêm dòng thông tin tổng kết
                csvContent += `\n"===== THÔNG TIN TỔNG KẾT =====","","","","",""\n`;
                csvContent += `"Học sinh","${studentInfo.name}","","","",""\n`;
                csvContent += `"Lớp","${studentInfo.class}","","","",""\n`;
                csvContent += `"Điểm tổng","${score}/10","","","",""\n`;
                csvContent += `"Ngày làm","${new Date().toLocaleString('vi-VN')}","","","",""\n`;

                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = `KetQua_${studentInfo.name}_${Date.now()}.csv`;
                link.click();
                URL.revokeObjectURL(url);
                showToast('Đã xuất file CSV (Excel)!', 'success');
            };

            // In kết quả
            const printResult = () => {
                if (!isGraded) {
                    alert("Vui lòng nộp bài trước khi in kết quả!");
                    return;
                }
                window.print();
            };

            // Icon components
            const BookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
            const User = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
            const AlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
            const Award = () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
            const CheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
            const Send = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
            const RefreshCw = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
            const Download = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polygon points="7 10 12 15 17 10 12 15 7 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
            const FileSpreadsheet = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
            const Printer = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3h12v6"/><rect x="6" y="15" width="12" height="6" rx="2"/></svg>;
            const Trash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;

            return (
                <div className="min-h-screen bg-slate-50 font-sans pb-20">
                    {/* Toast Notification */}
                    {toast && (
                        <div className="fixed top-4 right-4 z-50 toast-notification">
                            <div className={`rounded-lg shadow-lg p-4 ${
                                toast.type === 'success' ? 'bg-green-500' : 
                                toast.type === 'warning' ? 'bg-yellow-500' : 
                                'bg-blue-500'
                            } text-white`}>
                                {toast.message}
                            </div>
                        </div>
                    )}

                    <header className="bg-blue-600 text-white shadow-md">
                        <div className="max-w-6xl mx-auto px-4 py-8">
                            <div className="flex items-center gap-4 mb-4">
                                <div className="bg-white p-3 rounded-full text-blue-600"><BookOpen /></div>
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold">Bài Tập Thực Hành Tin Học</h1>
                                    <p className="text-blue-100 mt-1">Lớp học Thầy Chuyền - Khơi nguồn tư duy sáng tạo</p>
                                </div>
                            </div>
                            <div className="bg-blue-700/50 rounded-lg p-4 text-sm border border-blue-500">
                                <p className="flex items-center gap-2"><AlertCircle /><strong>Lời nhắn từ Thầy Chuyền:</strong> Chào các em! Hãy áp dụng những kiến thức đã học trên lớp để trả lời các câu hỏi sau. Bài làm sẽ được tự động lưu lại trong trình duyệt. Chúc các em làm bài tốt!</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 -mt-6">
                        {/* Phần thông tin học sinh */}
                        <div className="bg-white rounded-xl shadow-lg p-6 mb-8 border border-gray-100">
                            <div className="flex items-center gap-2 mb-4 border-b pb-2 border-gray-100"><User /><h2 className="text-xl font-semibold text-gray-800">Thông tin học sinh</h2></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Họ và Tên</label>
                                <input type="text" placeholder="Ví dụ: Nguyễn Văn A" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" value={studentInfo.name} onChange={(e) => setStudentInfo({ ...studentInfo, name: e.target.value })} disabled={isGraded} /></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Lớp</label>
                                <input type="text" placeholder="Ví dụ: 12A1" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" value={studentInfo.class} onChange={(e) => setStudentInfo({ ...studentInfo, class: e.target.value })} disabled={isGraded} /></div>
                            </div>
                        </div>

                        {/* Bảng điểm (chỉ hiện khi đã nộp) */}
                        {isGraded && (
                            <div className="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-xl shadow-md p-6 mb-8 border border-emerald-200 animate-fade-in">
                                <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                                    <div className="flex items-center gap-4"><div className="bg-emerald-500 p-4 rounded-full text-white"><Award /></div>
                                    <div><h3 className="text-2xl font-bold text-gray-800">Kết quả của {studentInfo.name}</h3><p className="text-emerald-700 font-medium">Lớp: {studentInfo.class}</p></div></div>
                                    <div className="text-center bg-white px-8 py-4 rounded-xl shadow-sm border border-emerald-100"><p className="text-sm text-gray-500 font-semibold mb-1">ĐIỂM ĐÁNH GIÁ</p><p className="text-4xl font-extrabold text-emerald-600">{score}<span className="text-xl text-gray-400">/10</span></p></div>
                                </div>
                                <div className="mt-4 pt-4 border-t border-emerald-200/60">
                                    <p className="text-gray-700 italic">
                                        {score === 10 ? "Tuyệt vời! Em nắm bài rất vững, đúng tinh thần học trò Thầy Chuyền." : 
                                         score >= 8 ? "Rất tốt! Tư duy phản biện và ghi nhớ của em rất đáng khen." : 
                                         score >= 5 ? "Khá lắm! Em hãy xem lại các phần gợi ý bên dưới để hoàn thiện kiến thức nhé." : 
                                         "Không sao, mục đích là để học hỏi! Hãy đọc kỹ gợi ý của thầy và thử lại lần nữa nhé."}
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* Danh sách câu hỏi */}
                        <div className="space-y-6">
                            {QUESTIONS.map((q, index) => (
                                <div key={q.id} className={`bg-white rounded-xl shadow-sm p-6 border transition-all ${isGraded ? 'border-gray-200' : 'border-blue-100 hover:border-blue-300'}`}>
                                    <h3 className="text-lg font-medium text-gray-800 mb-3">{q.text}</h3>
                                    <textarea className={`w-full p-4 border rounded-lg h-32 outline-none transition-all resize-y ${isGraded ? 'bg-gray-50 border-gray-200 text-gray-600 cursor-not-allowed' : 'border-blue-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500'}`} placeholder={isGraded ? "" : "Gõ câu trả lời của em vào đây..."} value={answers[index]} onChange={(e) => handleAnswerChange(index, e.target.value)} readOnly={isGraded}></textarea>
                                    {isGraded && feedback[index] && (
                                        <div className="mt-4 bg-blue-50 rounded-lg p-4 border border-blue-100">
                                            <div className="flex items-start gap-3"><CheckCircle /><div><h4 className="font-semibold text-blue-800 mb-1 flex items-center gap-2">Gợi ý của Thầy Chuyền<span className="text-xs bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full font-bold">Điểm đạt: {feedback[index].point}đ</span></h4><p className="text-gray-700 text-sm mb-2">{q.suggestion}</p><p className="text-sm italic text-gray-500 border-t border-blue-100 pt-2"><span className="font-semibold">Nhận xét:</span> {feedback[index].note}</p></div></div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* Buttons thao tác */}
                        <div className="mt-8 flex flex-wrap gap-4 justify-center">
                            {!isGraded ? (
                                <button onClick={handleGrade} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                                    <Send />Nộp Bài & Chấm Điểm
                                </button>
                            ) : (
                                <>
                                    <button onClick={saveAsTXT} className="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:shadow-xl transition-all">
                                        <Download />Lưu TXT
                                    </button>
                                    <button onClick={saveAsCSV} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:shadow-xl transition-all">
                                        <FileSpreadsheet />Xuất Excel
                                    </button>
                                    <button onClick={printResult} className="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:shadow-xl transition-all">
                                        <Printer />In Kết quả
                                    </button>
                                    <button onClick={handleReset} className="flex items-center gap-2 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:shadow-xl transition-all">
                                        <RefreshCw />Làm lại
                                    </button>
                                </>
                            )}
                            {!isGraded && (
                                <button onClick={clearLocalStorage} className="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:shadow-xl transition-all">
                                    <Trash />Xóa dữ liệu đã lưu
                                </button>
                            )}
                        </div>
                        
                        {/* Thông báo tự động lưu */}
                        <div className="mt-6 text-center text-xs text-gray-400">
                            <p>💾 Bài làm được tự động lưu lại trong trình duyệt. Bạn có thể tải lại trang mà không mất dữ liệu.</p>
                        </div>
                    </main>
                    
                    <footer className="text-center mt-12 text-gray-500 text-sm">
                        <p>© 2026 - Lớp học Tin Học Thầy Chuyền.</p>
                        <p>Học qua thực hành - Phát triển tư duy.</p>
                    </footer>

                    <style jsx>{`
                        @media print {
                            header, .buttons, footer, .toast-notification, button {
                                display: none !important;
                            }
                            body {
                                margin: 0;
                                padding: 0;
                            }
                            .bg-white, .rounded-xl, .shadow-lg {
                                box-shadow: none !important;
                                border: 1px solid #ddd !important;
                            }
                        }
                    `}</style>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
